services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: libradesk
      POSTGRES_PASSWORD: libradesk
      POSTGRES_DB: libradesk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U libradesk"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://libradesk:libradesk@db:5432/libradesk
      SECRET_KEY: change-me-in-prod
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && python -m scripts.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
